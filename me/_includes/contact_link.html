<!-- sprite.svg assets location src -->
{% assign sprite_src = "/assets/sprite.svg" %}

<a
	href="{{ include.href }}"
	class="contact-link transition"
	aria-labelledby="{{ include.platform | downcase }}"
	target="_blank"
	rel="external noopener noreferrer">
	<svg aria-hidden="true" class="icon">
		<use href="{{ sprite_src }}#{{ include.platform | downcase }}"></use>
	</svg>
	<span id="{{ include.platform | downcase }}" class="hover-contact"
		>{{ include.platform | titleize }}</span
	>
</a>
